aid: markup-language
name: Markup Language
description: >-
  A markup language is a system for annotating a document in a way that is
  syntactically distinguishable from the text. Examples include HTML, XML,
  Markdown, LaTeX, and others that add semantic meaning or formatting
  instructions to text content.
